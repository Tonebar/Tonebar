name: Build bridge app

# Builds on real macOS and Windows runners in GitHub's cloud -- this is how
# you get a .dmg without owning a Mac. Public repos get these runners free
# with no monthly limit; private repos get a solid free monthly allowance
# too.
#
# Runs automatically on every push to main, and can also be triggered
# manually from the Actions tab ("Run workflow" button).

on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: lr-remote-bridge-app

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build installer
        run: npm run dist

      # Uploads whatever electron-builder produced (the .exe installer)
      # so you can download it from the finished workflow run under
      # "Artifacts".
      - name: Upload build output
        uses: actions/upload-artifact@v4
        with:
          name: bridge-windows
          path: lr-remote-bridge-app/dist/*.exe
          if-no-files-found: warn

# Mac build is disabled for now -- electron-builder needs at least some
# code-signing setup to build cleanly on macOS in CI, even for an unsigned
# build. Once you have your Apple Developer ID, this can come back as:
#
#   build:
#     strategy:
#       matrix:
#         os: [macos-latest, windows-latest]
#     runs-on: ${{ matrix.os }}
#     ...(same steps, with CSC_LINK/CSC_KEY_PASSWORD/APPLE_ID/etc. set as
#         env vars from repo secrets so the Mac job has something to sign with)
